<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家計">
  <title>家計</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #0A0A0B;
      --surface: #111113;
      --surface2: #18181B;
      --surface3: #232326;
      --border: #27272A;
      --border2: #3F3F46;
      --text: #F4F4F5;
      --text2: #A1A1AA;
      --muted: #52525B;
      --green: #22C55E;
      --red: #F87171;
      --blue: #60A5FA;
      --yellow: #FBBF24;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,11,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 56px;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.6px;
    }

    .demo-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: #FBBF24;
      background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 5px;
      padding: 2px 6px;
      letter-spacing: 0.5px;
    }

    .header-period {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:active { background: var(--border2); }

    /* ── Scrollable pills ── */
    .scroll-row {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-row::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .pill.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .account-card {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .account-card.active {
      border-color: var(--blue);
      background: rgba(96,165,250,0.08);
      color: var(--blue);
    }

    /* ── Cards ── */
    .card {
      margin: 0 16px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
    }

    /* ── Hero ── */
    .hero-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .hero-balance {
      font-family: 'DM Mono', monospace;
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 20px;
    }
    .hero-balance.pos { color: var(--green); }
    .hero-balance.neg { color: var(--red); }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hero-cell {
      background: var(--surface2);
      border-radius: 14px;
      padding: 14px;
    }

    .hero-cell-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hero-cell-amount {
      font-family: 'DM Mono', monospace;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    .hero-cell-amount.income { color: var(--green); }
    .hero-cell-amount.expense { color: var(--red); }

    /* ── Chart ── */
    .tab-bar {
      display: flex;
      background: var(--surface2);
      border-radius: 12px;
      padding: 3px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      user-select: none;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    .chart-scroll { overflow-x: auto; scrollbar-width: none; }
    .chart-scroll::-webkit-scrollbar { display: none; }

    .chart-legend {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .legend-dot-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text2);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    /* Donut */
    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .donut-svg-container {
      position: relative;
      flex-shrink: 0;
      width: 150px;
      height: 150px;
    }

    .donut-center-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .donut-center-label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }
    .donut-center-amount {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      margin-top: 2px;
    }

    .donut-legend {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .donut-legend::-webkit-scrollbar { display: none; }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .legend-dot-circle {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-name {
      font-size: 12px;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .legend-pct {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .legend-amt {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text2);
      flex-shrink: 0;
    }

    /* ── Transactions ── */
    .txn-filter-row {
      display: flex;
      gap: 6px;
      padding: 4px 16px 12px;
    }

    .txn-filter-btn {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .txn-filter-btn.active {
      color: var(--text);
      border-color: var(--border);
      background: var(--surface2);
    }

    .txn-list { padding: 0 16px; }

    .date-header {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 10px 0 6px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
    }
    .date-header:first-child { border-top: none; margin-top: 0; }

    .txn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--surface2);
    }
    .txn-row:last-child { border-bottom: none; }

    .txn-icon-wrap {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .txn-body { flex: 1; min-width: 0; }

    .txn-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .txn-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 3px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 5px;
      background: var(--surface2);
      color: var(--text2);
    }

    .txn-amt {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      flex-shrink: 0;
      letter-spacing: -0.3px;
    }
    .txn-amt.income { color: var(--green); }
    .txn-amt.expense { color: var(--text); }

    /* ── Upload ── */
    .upload-area {
      margin: 8px 16px 0;
      border: 1.5px dashed var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-area.drag-over {
      border-color: var(--blue);
      background: rgba(96,165,250,0.05);
    }
    .upload-icon { font-size: 28px; margin-bottom: 10px; }
    .upload-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
    .upload-sub { font-size: 12px; color: var(--muted); line-height: 1.6; }

    #file-input { display: none; }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      animation: toast-in 0.25s ease, toast-out 0.25s ease 2.75s forwards;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(8px) scale(0.97); }
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-title">家計</span>
      <span class="demo-badge" id="demo-badge">DEMO</span>
    </div>
    <span class="header-period" id="header-period"></span>
    <button class="btn-icon" id="btn-upload">＋</button>
  </header>

  <!-- Month pills -->
  <div class="scroll-row" id="month-pills"></div>

  <!-- Hero card -->
  <div class="card">
    <div class="hero-label">差引残高</div>
    <div class="hero-balance" id="hero-balance">¥0</div>
    <div class="hero-grid">
      <div class="hero-cell">
        <div class="hero-cell-label">↑ 収入</div>
        <div class="hero-cell-amount income" id="hero-income">¥0</div>
      </div>
      <div class="hero-cell">
        <div class="hero-cell-label">↓ 支出</div>
        <div class="hero-cell-amount expense" id="hero-expense">¥0</div>
      </div>
    </div>
  </div>

  <!-- Account filter -->
  <div class="scroll-row" id="account-pills"></div>

  <!-- Chart card -->
  <div class="card" id="chart-card">
    <div class="tab-bar">
      <div class="tab-btn active" id="tab-trend">推移</div>
      <div class="tab-btn" id="tab-breakdown">内訳</div>
    </div>
    <div id="chart-body"></div>
  </div>

  <!-- Transaction filter tabs -->
  <div class="txn-filter-row">
    <button class="txn-filter-btn active" data-filter="all">すべて</button>
    <button class="txn-filter-btn" data-filter="income">収入</button>
    <button class="txn-filter-btn" data-filter="expense">支出</button>
  </div>

  <!-- Transaction list -->
  <div class="txn-list" id="txn-list"></div>

  <!-- Upload -->
  <div class="upload-area" id="upload-area">
    <div class="upload-icon">📂</div>
    <div class="upload-title">明細をアップロード</div>
    <div class="upload-sub">PDF / CSV をドラッグ＆ドロップ<br>またはタップして選択</div>
  </div>

  <input type="file" id="file-input" multiple accept=".pdf,.csv">
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ─────────────────────────────────────────
//  CATEGORIES
// ─────────────────────────────────────────
const CATS = [
  { key:'convenience', name:'コンビニ',   icon:'🏪', color:'#94A3B8',
    pat:['セイコーマート','ローソン','セブン-イレブン','セブンイレブン','ファミリーマート','LAWSON','7-ELEVEN','SEICO MART'] },
  { key:'transport',   name:'交通',       icon:'✈️', color:'#FBBF24',
    pat:['ETC','日本航空','JAL','ANA','新幹線','空港','駐車場','SUICA','PASMO','交通費','航空'] },
  { key:'gas',         name:'ガソリン',   icon:'⛽', color:'#F97316',
    pat:['ホクレン','ENEOS','出光','伊藤忠エネクス','キグナス','SS'] },
  { key:'utility',     name:'光熱費',     icon:'⚡', color:'#60A5FA',
    pat:['電力','電気代','トウキヨウデンリヨク','デンキリヨ','東ガス','水道局','TEPCO'] },
  { key:'mobile',      name:'通信費',     icon:'📱', color:'#A78BFA',
    pat:['楽天モバイル','ドコモ','UQ','ソフトバンク','DOCOMO','NTT'] },
  { key:'subscription',name:'サブスク',   icon:'📺', color:'#EC4899',
    pat:['SPOTIFY','NETFLIX','APPLE COM BILL','APPLE.COM','GOOGLE WORKSPACE','CLAUDE.AI','CLAUDE'] },
  { key:'grocery',     name:'食料品',     icon:'🛒', color:'#22C55E',
    pat:['ラツキ-','食品館','アオバ','スーパー','エーマート','ナガサワ','マルイ','イオン','マックスバリュ'] },
  { key:'restaurant',  name:'外食',       icon:'🍽', color:'#4ADE80',
    pat:['SQ*','イツキ','ヤクモ','居酒屋','アカシア','モリノジョウゾウ'] },
  { key:'shopping',    name:'ショッピング',icon:'🛍', color:'#F87171',
    pat:['AMAZON.CO.JP','AMAZON','楽天市場','ダイソー','ディーシーエム','DCM'] },
  { key:'drug',        name:'ドラッグ',   icon:'💊', color:'#34D399',
    pat:['ドラッグセイムス','マツモトキヨシ','ツルハ','マツキヨ','セイムス'] },
  { key:'investment',  name:'投資',       icon:'📈', color:'#818CF8',
    pat:['楽天証券','証券','投信','積立'] },
  { key:'insurance',   name:'保険',       icon:'🛡', color:'#6B7280',
    pat:['保険','生命','楽天生命'] },
  { key:'delivery',    name:'配送',       icon:'📦', color:'#C084FC',
    pat:['クロネコ','ヤマト運輸','佐川','ヤマト'] },
  { key:'salary',      name:'給与',       icon:'💰', color:'#22C55E',
    pat:['給与','賞与'] },
  { key:'other',       name:'その他',     icon:'📋', color:'#52525B', pat:[] },
];

const ACCOUNTS = [
  { key:'all',     label:'すべて' },
  { key:'rakuten', label:'楽天カード' },
  { key:'smbc',    label:'三井住友' },
  { key:'yucho',   label:'ゆうちょ' },
];

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let S = {
  txns: [],
  isDemo: true,
  month: 'all',
  account: 'all',
  chart: 'trend',
  txnFilter: 'all',
};

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function catOf(key) { return CATS.find(c => c.key === key) || CATS[CATS.length - 1]; }

function detectCat(name, isIncome) {
  if (isIncome) return 'salary';
  const u = name.toUpperCase();
  for (const c of CATS) {
    if (c.key === 'other') continue;
    for (const p of c.pat) {
      if (u.includes(p.toUpperCase())) return c.key;
    }
  }
  return 'other';
}

function fmt(n) {
  return '¥' + Math.abs(Math.round(n)).toLocaleString('ja-JP');
}

function fmtK(n) {
  const v = Math.abs(Math.round(n));
  if (v >= 100000) return '¥' + (v / 10000).toFixed(0) + '万';
  if (v >= 10000)  return '¥' + (v / 10000).toFixed(1) + '万';
  return '¥' + v.toLocaleString('ja-JP');
}

function monthLabel(ym) {
  const [y, m] = ym.split('-');
  return `${y}年${parseInt(m)}月`;
}

function dayOfWeek(dateStr) {
  const d = new Date(dateStr.replace(/\//g, '-'));
  return '日月火水木金土'[d.getDay()];
}

let _uid = 1;
function uid() { return String(_uid++); }

// ─────────────────────────────────────────
//  DEMO DATA
// ─────────────────────────────────────────
function makeDemoData() {
  const txns = [];
  function t(date, name, amount, account, isIncome = false) {
    txns.push({ id: uid(), date, name, amount, account, isIncome, category: detectCat(name, isIncome) });
  }

  // March 2026
  t('2026/03/03', 'セイコーマート', 450, 'rakuten');
  t('2026/03/05', 'ローソン', 630, 'rakuten');
  t('2026/03/07', 'ホクレンSS', 4800, 'rakuten');
  t('2026/03/10', '日本航空国内線 JAL', 28000, 'rakuten');
  t('2026/03/12', 'CLAUDE.AI', 2500, 'rakuten');
  t('2026/03/14', 'AMAZON.CO.JP', 3200, 'rakuten');
  t('2026/03/15', '楽天証券投信積立', 50000, 'rakuten');
  t('2026/03/16', '楽天生命保険', 3200, 'rakuten');
  t('2026/03/17', 'SPOTIFY', 980, 'rakuten');
  t('2026/03/17', 'APPLE COM BILL', 1100, 'rakuten');
  t('2026/03/19', 'ドラッグセイムス', 2100, 'rakuten');
  t('2026/03/20', 'ダイソー', 880, 'rakuten');
  t('2026/03/21', 'クロネコヤマト', 550, 'rakuten');
  t('2026/03/22', 'トウキヨウデンリヨクデンキリヨ', 8400, 'rakuten');
  t('2026/03/24', '楽天モバイル', 1078, 'rakuten');
  t('2026/03/25', '給与', 350000, 'yucho', true);
  t('2026/03/26', 'ドコモ', 4200, 'smbc');
  t('2026/03/26', 'UQモバイル', 2178, 'smbc');
  t('2026/03/27', 'ETC利用料', 1580, 'smbc');
  t('2026/03/28', '伊藤忠エネクスSS', 5200, 'smbc');

  // April 2026
  t('2026/04/02', 'セイコーマート', 380, 'rakuten');
  t('2026/04/04', 'ローソン', 520, 'rakuten');
  t('2026/04/05', 'ホクレンSS', 4200, 'rakuten');
  t('2026/04/07', '日本航空国内線 JAL', 22000, 'rakuten');
  t('2026/04/09', 'CLAUDE.AI', 2500, 'rakuten');
  t('2026/04/11', 'AMAZON.CO.JP', 5600, 'rakuten');
  t('2026/04/12', 'ダイソー', 660, 'rakuten');
  t('2026/04/14', '楽天証券投信積立', 50000, 'rakuten');

// ─────────────────────────────────────────
//  FILTERS
// ─────────────────────────────────────────
function filtered(opts = {}) {
  let txns = S.txns.slice();
  const acct = opts.account ?? S.account;
  const month = opts.month ?? S.month;

  if (acct !== 'all') txns = txns.filter(t => t.account === acct);
  if (month !== 'all') txns = txns.filter(t => t.date.startsWith(month));
  return txns;
}

function summary(opts) {
  const txns = filtered(opts);
  const income  = txns.filter(t => t.isIncome).reduce((s, t) => s + t.amount, 0);
  const expense = txns.filter(t => !t.isIncome).reduce((s, t) => s + t.amount, 0);
  return { income, expense, balance: income - expense };
}

function months() {
  const set = new Set(S.txns.map(t => t.date.slice(0, 7)));
  return [...set].sort().reverse();
}

// ─────────────────────────────────────────
//  RENDER PIPELINE

function renderBadge() {
  const el = document.getElementById('demo-badge');
  el.style.display = S.isDemo ? '' : 'none';
}

function renderHeaderPeriod() {
  const el = document.getElementById('header-period');
  if (S.month !== 'all') {
    el.textContent = monthLabel(S.month);
    return;
  }
  const ms = months();
  if (!ms.length) { el.textContent = ''; return; }
  if (ms.length === 1) { el.textContent = monthLabel(ms[0]); return; }
  const first = ms[ms.length - 1];
  const last = ms[0];
  el.textContent = first.replace('-', '/') + ' – ' + last.replace('-', '/');
}

function renderMonthPills() {
  const wrap = document.getElementById('month-pills');

  wrap.innerHTML = pills.map(p =>
    `<button class="pill${p.key === S.month ? ' active' : ''}" data-m="${p.key}">${p.label}</button>`

// ─────────────────────────────────────────
//  CHART
// ─────────────────────────────────────────
function renderChart() {
  document.getElementById('tab-trend').classList.toggle('active', S.chart === 'trend');
  document.getElementById('tab-breakdown').classList.toggle('active', S.chart === 'breakdown');
  document.getElementById('chart-body').innerHTML =
    S.chart === 'trend' ? buildBarChart() : buildDonutChart();
}

function buildBarChart() {
  // Monthly data for current account filter (ignore month filter for trend)
  const allTxns = S.account === 'all' ? S.txns : S.txns.filter(t => t.account === S.account);
  const ms = [...new Set(allTxns.map(t => t.date.slice(0, 7)))].sort();

  if (!ms.length) return '<div class="empty-state">データなし</div>';

  const data = ms.map(m => {
    const mTxns = allTxns.filter(t => t.date.startsWith(m));
    return {
      month: m,
      income:  mTxns.filter(t => t.isIncome).reduce((s, t) => s + t.amount, 0),
      expense: mTxns.filter(t => !t.isIncome).reduce((s, t) => s + t.amount, 0),
    };
  });

  const maxVal = Math.max(...data.flatMap(d => [d.income, d.expense]), 1);
  const TICKS = 4;
  const rawStep = maxVal / TICKS;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const niceStep = Math.ceil(rawStep / mag) * mag;
  const maxTick = niceStep * TICKS;

  const H = 150;
  const PL = 52;
  const PB = 24;
  const PT = 8;
  const BAR_W = 18;
  const GAP = 4;
  const GROUP = BAR_W * 2 + GAP + 18;
  const W = PL + data.length * GROUP + 16;

  let grid = '', yLbls = '', bars = '', xLbls = '';

  for (let i = 0; i <= TICKS; i++) {
    const v = niceStep * i;
    const y = PT + H - (v / maxTick) * H;
    grid  += `<line x1="${PL}" y1="${y}" x2="${W}" y2="${y}" stroke="#27272A" stroke-width="1"/>`;
    yLbls += `<text x="${PL - 5}" y="${y + 4}" text-anchor="end" fill="#52525B" font-size="9" font-family="DM Mono">${v === 0 ? '0' : fmtK(v).replace('¥','')}</text>`;
  }

  data.forEach((d, i) => {
    const x = PL + i * GROUP;
    const iH = maxTick > 0 ? (d.income  / maxTick) * H : 0;
    const eH = maxTick > 0 ? (d.expense / maxTick) * H : 0;
    const by = PT + H;
    bars += `<rect x="${x}" y="${by - iH}" width="${BAR_W}" height="${iH || 0}" rx="3" fill="#22C55E" opacity="0.85"/>`;
    bars += `<rect x="${x + BAR_W + GAP}" y="${by - eH}" width="${BAR_W}" height="${eH || 0}" rx="3" fill="#F87171" opacity="0.85"/>`;
    const lbl = parseInt(d.month.slice(5)) + '月';
    xLbls += `<text x="${x + BAR_W + GAP/2}" y="${by + 16}" text-anchor="middle" fill="#52525B" font-size="9" font-family="DM Mono">${lbl}</text>`;
  });

  const svgH = H + PT + PB;

  return `
    <div class="chart-legend">
      <div class="legend-dot-row"><span class="dot" style="background:#22C55E"></span>収入</div>
      <div class="legend-dot-row"><span class="dot" style="background:#F87171"></span>支出</div>
    </div>
    <div class="chart-scroll">
      <svg width="${W}" height="${svgH}" style="display:block;min-width:100%">
        ${grid}${yLbls}${bars}${xLbls}
        <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT + H}" stroke="#27272A" stroke-width="1"/>
      </svg>
    </div>
  `;
}

function buildDonutChart() {
  const txns = filtered();
  const expenses = txns.filter(t => !t.isIncome);
  const total = expenses.reduce((s, t) => s + t.amount, 0);

  if (!total) return '<div class="empty-state">支出データなし</div>';

  const catMap = {};
  expenses.forEach(t => { catMap[t.category] = (catMap[t.category] || 0) + t.amount; });
  const catData = Object.entries(catMap)
    .map(([key, amount]) => ({ key, amount, cat: catOf(key) }))
    .sort((a, b) => b.amount - a.amount);

  const SIZE = 150;
  const CX = SIZE / 2, CY = SIZE / 2;
  const R = 58, r = 36;
  let paths = '';
  let angle = -Math.PI / 2;
  const GAP = 0.025;

  catData.forEach(({ amount, cat }) => {
    const frac = amount / total;
    const end = angle + frac * 2 * Math.PI;
    const sa = angle + GAP, ea = end - GAP;
    const large = frac > 0.5 ? 1 : 0;
    const p = (a, radius) => [CX + radius * Math.cos(a), CY + radius * Math.sin(a)];
    const [x1,y1] = p(sa, R), [x2,y2] = p(ea, R);
    const [x3,y3] = p(ea, r), [x4,y4] = p(sa, r);
    const d = `M${x1},${y1} A${R},${R},0,${large},1,${x2},${y2} L${x3},${y3} A${r},${r},0,${large},0,${x4},${y4}Z`;
    paths += `<path d="${d}" fill="${cat.color}" opacity="0.9"/>`;
    angle = end;
  });

  const legend = catData.map(({ amount, cat }) => {
    const pct = Math.round(amount / total * 100);
    return `
      <div class="legend-row">
        <div class="legend-dot-circle" style="background:${cat.color}"></div>
        <div class="legend-name">${cat.icon} ${cat.name}</div>
        <div class="legend-pct">${pct}%</div>
        <div class="legend-amt">${fmtK(amount)}</div>
      </div>`;
  }).join('');

  return `
    <div class="donut-wrap">
      <div class="donut-svg-container">
        <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">${paths}</svg>
        <div class="donut-center-text">
          <div class="donut-center-label">支出合計</div>
          <div class="donut-center-amount">${fmtK(total)}</div>
        </div>
      </div>
      <div class="donut-legend">${legend}</div>
    </div>
  `;
}

// ─────────────────────────────────────────

function renderTxnList() {

// ─────────────────────────────────────────
//  FILE DETECTION
// ─────────────────────────────────────────
function detectAccount(filename) {
  const l = filename.toLowerCase();
  if (l.includes('rakuten') || l.includes('楽天') || l.includes('statement')) return 'rakuten';
  if (l.includes('smbc') || l.includes('vpass') || l.includes('mitsui') || l.includes('三井')) return 'smbc';
  return 'yucho';
}

// ─────────────────────────────────────────
//  CSV PARSER
// ─────────────────────────────────────────
function parseCSV(text, account) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const txns = [];

  for (let i = 1; i < lines.length; i++) {
    const c = lines[i].split(',').map(s => s.replace(/^["']+|["']+$/g, '').trim());
    try {
      if (account === 'rakuten') {
        // 利用日,利用店名,利用者,支払方法,利用金額,手数料,支払総額,当月請求額,翌月繰越
        const date = c[0]?.replace(/-/g, '/');
        const name = c[1];
        const amount = parseInt((c[4] || '').replace(/,/g, ''));
        if (date && name && amount > 0)
          txns.push({ id: uid(), date, name, amount, account, isIncome: false, category: detectCat(name, false) });
      } else if (account === 'smbc') {
        // 年月日,摘要,お引出し,お預入れ,残高
        const date = c[0]?.replace(/-/g, '/');
        const name = c[1];
        const wd = parseInt((c[2] || '').replace(/,/g, '')) || 0;
        const dp = parseInt((c[3] || '').replace(/,/g, '')) || 0;
        if (date && name) {
          if (wd > 0) txns.push({ id: uid(), date, name, amount: wd, account, isIncome: false, category: detectCat(name, false) });
          if (dp > 0) txns.push({ id: uid(), date, name, amount: dp, account, isIncome: true,  category: detectCat(name, true)  });
        }
      } else {
        // ゆうちょ: 年月日,お取り扱い内容,お預入,お引出,残高
        const date = c[0]?.replace(/-/g, '/');
        const name = c[1];
        const dp = parseInt((c[2] || '').replace(/,/g, '')) || 0;
        const wd = parseInt((c[3] || '').replace(/,/g, '')) || 0;
        if (date && name) {
          if (dp > 0) txns.push({ id: uid(), date, name, amount: dp, account, isIncome: true,  category: detectCat(name, true)  });
          if (wd > 0) txns.push({ id: uid(), date, name, amount: wd, account, isIncome: false, category: detectCat(name, false) });
        }
      }
    } catch (_) {}
  }
  return txns;
}

// ─────────────────────────────────────────
//  PDF PARSER
// ─────────────────────────────────────────
async function parsePDF(buf, account) {
  const txns = [];
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    for (let p = 1; p <= pdf.numPages; p++) {
      const page    = await pdf.getPage(p);
      const content = await page.getTextContent();
      const text    = content.items.map(i => i.str).join(' ');

      if (account === 'rakuten') {
        const re = /(\d{4}\/\d{2}\/\d{2})\s+(.+?)\s+(本人|家族|ETC)[*＊]?\s+\S+払い\s+([\d,]+)\s+[\d,]+\s+[\d,]+\s+[\d,]+/g;
        let m;
        while ((m = re.exec(text)) !== null) {
          const date = m[1], name = m[2].trim(), amount = parseInt(m[4].replace(/,/g, ''));
          if (amount > 0) txns.push({ id: uid(), date, name, amount, account, isIncome: false, category: detectCat(name, false) });
        }
      }

      // Fallback generic pattern
      if (!txns.length) {
        const re = /(\d{4}[\/\-]\d{2}[\/\-]\d{2})\s+([^\d]{2,30?}?)\s+([\d,]{3,})/g;
        let m;
        while ((m = re.exec(text)) !== null) {
          const date = m[1].replace(/-/g, '/'), name = m[2].trim();
          const amount = parseInt(m[3].replace(/,/g, ''));
          if (amount > 0 && amount < 10_000_000)
            txns.push({ id: uid(), date, name, amount, account, isIncome: false, category: detectCat(name, false) });
        }
      }
    }
  } catch (e) { console.warn('PDF parse error:', e); }
  return txns;
}

// ─────────────────────────────────────────
//  DEDUP & MERGE
// ─────────────────────────────────────────
function dedupe(existing, incoming) {
  const keys = new Set(existing.map(t => `${t.date}|${t.name}|${t.amount}`));
  return incoming.filter(t => {
    const k = `${t.date}|${t.name}|${t.amount}`;
    if (keys.has(k)) return false;
    keys.add(k);
    return true;
  });
}

async function handleFiles(files) {
  let totalAdded = 0;
  for (const file of files) {
    const account = detectAccount(file.name);
    let incoming = [];
    if (/\.csv$/i.test(file.name)) {
      incoming = parseCSV(await file.text(), account);
    } else if (/\.pdf$/i.test(file.name)) {
      incoming = await parsePDF(await file.arrayBuffer(), account);
    }
    const unique = dedupe(S.txns, incoming);
    if (!unique.length) continue;

    if (S.isDemo) {
      S.txns = unique;
      S.isDemo = false;
    } else {
      S.txns = [...S.txns, ...unique];
    }
    totalAdded += unique.length;
  }
  if (totalAdded > 0) {
    save();
    toast(`${totalAdded}件の取引を読み込みました`);
    render();
  } else {
    toast('新しいデータが見つかりませんでした');
  }
}

// ─────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('finance_txns', JSON.stringify(S.txns));
    localStorage.setItem('finance_demo', String(S.isDemo));
  } catch (_) {}
}

function load() {
  try {
    const raw = localStorage.getItem('finance_txns');
    if (!raw) return false;
    S.txns = JSON.parse(raw);
    S.isDemo = localStorage.getItem('finance_demo') === 'true';
    if (S.txns.length) return true;
  } catch (_) {}
  return false;
}

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
function toast(msg) {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ─────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────
function setupEvents() {
  const fileInput  = document.getElementById('file-input');
  const uploadArea = document.getElementById('upload-area');

  document.getElementById('btn-upload').onclick = () => fileInput.click();
  uploadArea.onclick = () => fileInput.click();

  fileInput.onchange = e => {
    const files = Array.from(e.target.files).filter(f => /\.(pdf|csv)$/i.test(f.name));
    if (files.length) handleFiles(files);
    e.target.value = '';
  };

  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files).filter(f => /\.(pdf|csv)$/i.test(f.name));
    if (files.length) handleFiles(files);
  });

  document.getElementById('tab-trend').onclick     = () => { S.chart = 'trend';     renderChart(); };
  document.getElementById('tab-breakdown').onclick = () => { S.chart = 'breakdown'; renderChart(); };

  document.querySelectorAll('.txn-filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.txn-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      S.txnFilter = btn.dataset.filter;
      renderTxnList();
    };
  });
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
function init() {
  if (!load()) {
    S.txns  = makeDemoData();
    S.isDemo = true;
    save();
  }
  setupEvents();
  render();
}

init();
