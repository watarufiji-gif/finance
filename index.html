<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0B">
<title>家計</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0B;--card:#111113;--card2:#18181B;--card3:#1F1F23;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#F4F4F5;--muted:#71717A;--dim:#3F3F46;
  --green:#22C55E;--red:#F87171;--blue:#60A5FA;
  --rakuten:#FF4040;--smbc:#4D9FFF;--yucho:#4ADE80;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overscroll-behavior:none}
body{max-width:480px;margin:0 auto;padding-bottom:calc(env(safe-area-inset-bottom)+20px)}

.hd{padding:52px 20px 0;display:flex;align-items:flex-start;justify-content:space-between}
.hd-title{font-size:26px;font-weight:300;letter-spacing:-.5px}
.hd-period{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:3px;min-height:15px}
.hd-plus{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--muted);transition:all .15s;flex-shrink:0;margin-top:2px}
.hd-plus:hover{color:var(--text)}

.mwrap{overflow-x:auto;padding:18px 20px 0;scrollbar-width:none}
.mwrap::-webkit-scrollbar{display:none}
.mrow{display:flex;gap:6px;width:max-content}
.mp{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.mp.on{background:var(--text);color:var(--bg);border-color:var(--text)}

.hero{margin:16px 20px 0;background:var(--card);border-radius:20px;padding:22px;border:1px solid var(--border);position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(96,165,250,.08) 0%,transparent 65%);pointer-events:none}
.hero-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.8px;text-transform:uppercase}
.hero-amt{font-size:40px;font-weight:300;letter-spacing:-2px;margin:6px 0 18px;font-family:var(--mono);line-height:1}
.hero-amt.pos{color:var(--green)}
.hero-amt.neg{color:var(--red)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero-box{background:var(--card2);border-radius:12px;padding:12px 14px}
.hero-box-lbl{font-size:10px;color:var(--muted);margin-bottom:5px}
.hero-box-val{font-size:18px;font-weight:500;font-family:var(--mono);letter-spacing:-.5px}
.hero-box-val.inc{color:var(--green)}
.hero-box-val.exp{color:var(--red)}

.sec{padding:16px 20px 0}
.sec-lbl{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.acc-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.acc-row::-webkit-scrollbar{display:none}
.acc{flex-shrink:0;width:118px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:all .15s}
.acc.on{border-color:rgba(255,255,255,.28);background:var(--card2)}
.acc-dot{width:7px;height:7px;border-radius:50%;margin-bottom:10px}
.acc-name{font-size:11px;font-weight:500;margin-bottom:6px;line-height:1.3;color:var(--muted)}
.acc-amt{font-size:14px;font-weight:600;font-family:var(--mono);letter-spacing:-.5px}
.acc-amt.neg{color:var(--red)}
.acc-amt.pos{color:var(--green)}
.acc-amt.neu{color:var(--text)}

.chart-card{margin:16px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px}
.chart-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.chart-title{font-size:13px;font-weight:500;color:var(--text)}
.chart-tabs{display:flex;gap:2px;background:var(--card2);border-radius:8px;padding:2px}
.ctab{font-size:11px;padding:4px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .15s}
.ctab.on{background:var(--card3);color:var(--text)}
.chart-sub{font-size:10px;color:var(--dim);font-family:var(--mono);margin-bottom:16px;min-height:14px;letter-spacing:.3px}

.bar-area{position:relative;height:130px}
.bar-yaxis{position:absolute;left:0;top:0;bottom:22px;width:38px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.bar-ylabel{font-size:9px;color:var(--dim);font-family:var(--mono);text-align:right;line-height:1}
.bar-inner{position:absolute;left:44px;right:0;top:0;bottom:22px;display:flex;align-items:flex-end;gap:5px}
.bar-gridlines{position:absolute;left:44px;right:0;top:0;bottom:22px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.bar-gl{border-top:1px solid rgba(255,255,255,.04);width:100%}
.bg{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bw{display:flex;align-items:flex-end;gap:2px;width:100%;justify-content:center}
.b{border-radius:3px 3px 0 0;min-height:2px;transition:height .5s cubic-bezier(.4,0,.2,1);width:11px}
.b.inc{background:var(--green);opacity:.8}
.b.exp{background:var(--red);opacity:.8}
.bar-xlabels{position:absolute;left:44px;right:0;bottom:0;height:20px;display:flex;gap:5px}
.bar-xl{flex:1;font-size:9px;color:var(--dim);font-family:var(--mono);text-align:center;line-height:20px}
.bar-leg{display:flex;gap:12px;margin-top:12px;justify-content:flex-end}
.bar-leg-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.bar-leg-d{width:10px;height:3px;border-radius:2px}

.donut-wrap{display:flex;align-items:center;gap:18px}
.donut-svg-wrap{position:relative;flex-shrink:0;width:144px;height:144px}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:76px}
.donut-center-val{font-size:15px;font-weight:500;font-family:var(--mono);color:var(--text);letter-spacing:-.5px;white-space:nowrap}
.donut-center-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0}
.dl-row{display:flex;align-items:center;gap:7px}
.dl-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.dl-name{font-size:11px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dl-right{text-align:right;flex-shrink:0}
.dl-pct{font-size:12px;font-family:var(--mono);color:var(--text);font-weight:500}
.dl-amt{font-size:9px;font-family:var(--mono);color:var(--dim);display:block}

.tabs{display:flex;gap:4px;margin:16px 20px 0;background:var(--card);border-radius:12px;padding:4px}
.ttab{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .15s}
.ttab.on{background:var(--card2);color:var(--text)}
.txns{padding:12px 20px 0;display:flex;flex-direction:column;gap:1px}
.dh{font-size:10px;font-family:var(--mono);color:var(--dim);padding:10px 0 5px;letter-spacing:.5px}
.txn{background:var(--card);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:2px}
.txn-ic{width:34px;height:34px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.txn-bd{flex:1;min-width:0}
.txn-nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.txn-meta{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--card2);color:var(--muted);font-family:var(--mono)}
.tag.rakuten{background:rgba(255,64,64,.12);color:var(--rakuten)}
.tag.smbc{background:rgba(77,159,255,.12);color:var(--smbc)}
.tag.yucho{background:rgba(74,222,128,.12);color:var(--yucho)}
.txn-amt{font-size:14px;font-weight:600;font-family:var(--mono);flex-shrink:0;letter-spacing:-.5px}
.txn-amt.neg{color:var(--red)}
.txn-amt.pos{color:var(--green)}

.upload{margin:20px 20px 0;background:var(--card);border:1.5px dashed var(--dim);border-radius:20px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s}
.upload:hover{border-color:var(--muted)}
.upload.drag{border-color:var(--blue);background:rgba(96,165,250,.05)}
.upload-ic{font-size:26px;margin-bottom:8px}
.upload-t{font-size:14px;font-weight:500;margin-bottom:4px}
.upload-s{font-size:11px;color:var(--muted);line-height:1.5}
.ubadges{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.ub{font-size:10px;padding:3px 10px;border-radius:5px;font-weight:500;font-family:var(--mono)}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--text);opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}
.sp{height:40px}
@media (min-width: 768px) {
  body{max-width:1100px;padding:0 40px}
  .pc-layout{display:flex;gap:32px;align-items:flex-start}
  .pc-left{width:380px;flex-shrink:0;position:sticky;top:20px}
  .pc-right{flex:1;min-width:0}
  .hero-amt{font-size:48px}
  .hero-box-val{font-size:22px}
  .bar-area{height:160px}
}
</style>
</head>
<body>

<div class="pc-layout">
  <div class="pc-left">

    <div class="hd">
      <div>
        <div class="hd-title">家計</div>
        <div class="hd-period" id="period-label">—</div>
        <div id="sync-status" style="font-size:10px;font-family:var(--mono);margin-top:2px"></div>
      </div>
      <div class="hd-plus" onclick="document.getElementById('fu').click()" title="PDFまたはCSVをアップロード">＋</div>
    </div>

    <div class="mwrap"><div class="mrow" id="mrow"></div></div>

    <div class="hero">
      <div class="hero-lbl">差引残高</div>
      <div id="hero-period" style="font-size:10px;color:var(--dim);font-family:var(--mono);margin-bottom:2px;min-height:13px"></div>
      <div class="hero-amt" id="net">¥0</div>
      <div class="hero-grid">
        <div class="hero-box"><div class="hero-box-lbl">収入</div><div class="hero-box-val inc" id="inc">¥0</div></div>
        <div class="hero-box"><div class="hero-box-lbl">支出</div><div class="hero-box-val exp" id="exp">¥0</div></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-lbl">口座</div>
      <div class="acc-row">
        <div class="acc on" onclick="setAcc('all',this)"><div class="acc-dot" style="background:var(--muted)"></div><div class="acc-name">すべて</div><div class="acc-amt neu" id="a-all">¥0</div></div>
        <div class="acc" onclick="setAcc('rakuten',this)"><div class="acc-dot" style="background:var(--rakuten)"></div><div class="acc-name">楽天カード</div><div class="acc-amt neg" id="a-rakuten">¥0</div></div>
        <div class="acc" onclick="setAcc('smbc',this)"><div class="acc-dot" style="background:var(--smbc)"></div><div class="acc-name">三井住友</div><div class="acc-amt neg" id="a-smbc">¥0</div></div>
        <div class="acc" onclick="setAcc('yucho',this)"><div class="acc-dot" style="background:var(--yucho)"></div><div class="acc-name">ゆうちょ</div><div class="acc-amt pos" id="a-yucho">¥0</div></div>
      </div>
    </div>

  </div><!-- /.pc-left -->

  <div class="pc-right">

    <div class="chart-card">
      <div class="chart-hd">
        <div class="chart-title" id="chart-title">収支推移</div>
        <div class="chart-tabs">
          <button class="ctab on" onclick="setChart('bar',this)">推移</button>
          <button class="ctab" onclick="setChart('donut',this)">内訳</button>
        </div>
      </div>
      <div class="chart-sub" id="chart-sub"></div>

      <div id="cv-bar">
        <div class="bar-area">
          <div class="bar-yaxis" id="bar-yaxis"></div>
          <div class="bar-gridlines"><div class="bar-gl"></div><div class="bar-gl"></div><div class="bar-gl"></div><div class="bar-gl"></div></div>
          <div class="bar-inner" id="bar-inner"></div>
          <div class="bar-xlabels" id="bar-xlabels"></div>
        </div>
        <div class="bar-leg">
          <div class="bar-leg-i"><div class="bar-leg-d" style="background:var(--green)"></div>収入</div>
          <div class="bar-leg-i"><div class="bar-leg-d" style="background:var(--red)"></div>支出</div>
        </div>
      </div>

      <div id="cv-donut" style="display:none">
        <div class="donut-wrap">
          <div class="donut-svg-wrap">
            <svg id="dsvg" width="144" height="144" viewBox="0 0 144 144"></svg>
            <div class="donut-center"><div class="donut-center-val" id="dc-val">¥0</div><div class="donut-center-lbl">支出合計</div></div>
          </div>
          <div class="donut-legend" id="dlegend"></div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="ttab on" onclick="setTab('all',this)">すべて</button>
      <button class="ttab" onclick="setTab('income',this)">収入</button>
      <button class="ttab" onclick="setTab('expense',this)">支出</button>
    </div>
    <div class="txns" id="txns"></div>

    <div class="upload" id="dropzone"
      onclick="document.getElementById('fu').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="onDrop(event)">
      <input type="file" id="fu" accept=".pdf,.csv" multiple style="display:none" onchange="onFile(event)">
      <div class="upload-ic">📂</div>
      <div class="upload-t">実データをアップロード</div>
      <div class="upload-s">PDF・CSV・ETCカード明細をドロップ</div>
      <div class="ubadges">
        <span class="ub" style="background:rgba(255,64,64,.15);color:var(--rakuten)">楽天 PDF/CSV</span>
        <span class="ub" style="background:rgba(77,159,255,.15);color:var(--smbc)">SMBC CSV</span>
        <span class="ub" style="background:rgba(74,222,128,.15);color:var(--yucho)">ゆうちょ CSV</span>
      </div>
    </div>

  </div><!-- /.pc-right -->
</div><!-- /.pc-layout -->
<div class="sp"></div>
<div class="toast" id="toast"></div>

function yen(n,sign=false){
  const abs=Math.abs(n);
  const s=abs>=10000?Math.round(abs/10000)+'万':abs.toLocaleString('ja-JP');
  return (sign&&n>0?'+':'')+'¥'+s;
}

}

function detectSrc(fname){
  const f=fname.toLowerCase();
  if(f.includes('enavi')||f.includes('rakuten')||f.includes('楽天'))return 'rakuten';
  if(f.includes('etc')||f.includes('高速'))return 'etc';
  if(f.includes('smbc')||f.includes('vpass')||f.includes('mitsui')||f.includes('三井'))return 'smbc';
  if(f.includes('yucho')||f.includes('ゆうちょ')||f.includes('jp-bank'))return 'yucho';
  return null;
}

async function parsePDF(file,src){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let full='';
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const ct=await pg.getTextContent();
    full+=ct.items.map(it=>it.str).join(' ')+'\n';
  }
  const out=[];
  const re=/(\d{4}\/\d{2}\/\d{2})\s+(.+?)\s+(本人|家族|ETC)[*＊]?\s+\S+払い\s+([\d,]+)\s+[\d,]+\s+[\d,]+\s+[\d,]+/g;
  let m;
  while((m=re.exec(full))!==null){
    const date=m[1].replace(/\//g,'-');
    const name=m[2].trim();
    const amount=-parseInt(m[4].replace(/,/g,''),10);
    if(!name||isNaN(amount)||amount===0)continue;
    const g=gC(name);
    out.push({date,name,amount,type:'expense',...g,src});
  }
  return out;
}

function normalizeDate(s){
  if(!s) return '';
  s=s.trim().replace(/"/g,'');
  if(/^\d{8}$/.test(s))
    return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  const yy=s.match(/^(\d{2})\/(\d{2})\/(\d{2})$/);
  if(yy) return `${2000+parseInt(yy[1])}-${yy[2]}-${yy[3]}`;
  const m=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return '';
}

async function decodeFile(file){
  const buf=await file.arrayBuffer();
  const bytes=new Uint8Array(buf);
  if(bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF)
    return new TextDecoder('utf-8').decode(buf);
  try{
    const sjis=new TextDecoder('shift-jis').decode(buf);
    if(/[ぁ-ん]|[ァ-ン]|[亜-熙々]|[ｦ-ﾟ]/.test(sjis))return sjis;
  }catch(e){}
  return new TextDecoder('utf-8').decode(buf);
}

function splitCSV(line){
  const r=[];let c='';let q=false;
  for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}
  r.push(c.trim());return r;
}
function parseCSV(text,src){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const out=[];

  if(src==='rakuten'){
    // 楽天enavi: UTF-8 BOM、ヘッダーあり
    // 列: 利用日,利用店名・商品名,利用者,支払方法,利用金額,...
    lines.forEach(row=>{
      const c=splitCSV(row);
      if(c.length<5)return;
      if(c[0].replace(/"/g,'').includes('利用日'))return; // ヘッダースキップ
      const date=normalizeDate(c[0]);
      if(!date||!date.match(/^\d{4}-\d{2}-\d{2}$/))return;
      let name=(c[1]||'').trim().replace(/"/g,'');
      // VISA/JCBプレフィックス除去（例: "ＶＩＳＡ国内利用　VS "）
      name=name.replace(/^[Ａ-Ｚa-zA-Z]+[国内海外]*利用[　\s]*[Ａ-ＺA-Z\s]*/,'').trim();
      if(!name)return;
      const rawAmt=(c[4]||'0').replace(/[^\d]/g,'');
      const amount=rawAmt?-parseInt(rawAmt,10):0;
      const g=gC(name);
      out.push({date,name,amount,type:'expense',...g,src});
    });

  }else if(src==='smbc'){
    // 三井住友カード: Shift-JIS、ヘッダーなし
    // 列: 日付,店名,利用者,支払方法,空,請求月,利用金額,支払金額,...
    lines.forEach(row=>{
      const c=splitCSV(row);
      if(c.length<7)return;
      const date=normalizeDate(c[0]);
      if(!date||!date.match(/^\d{4}-\d{2}-\d{2}$/))return;
      const name=(c[1]||'').trim();
      if(!name)return;
      const rawAmt=(c[6]||'0')
        .replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0))
        .replace(/[^\d]/g,'');
      const amount=rawAmt?-parseInt(rawAmt,10):0;
      const g=gC(name);
      out.push({date,name,amount,type:'expense',...g,src});
    });

  }else if(src==='yucho'){
    // ゆうちょ: Shift-JIS、先頭説明行あり
    // 列: 取引日(yyyymmdd),明細ID,受入金額,払出金額,詳細1,詳細2,残高
    lines.forEach(row=>{
      const c=splitCSV(row);
      if(c.length<4)return;
      if(!/^\d{8}$/.test(c[0].trim()))return; // 8桁日付以外スキップ
      const date=normalizeDate(c[0]);
      if(!date)return;
      const detail1=(c[4]||'').trim();
      const detail2=(c[5]||'').trim();
      const name=[detail1,detail2].filter(Boolean).join(' ')||'取引';
      const dep=parseInt((c[2]||'0').replace(/[^\d]/g,''),10)||0;
      const wit=parseInt((c[3]||'0').replace(/[^\d]/g,''),10)||0;
      const amount=dep>0?dep:wit>0?-wit:0;
      if(amount===0)return;
      const g=gC(name);
      out.push({date,name,amount,type:amount>=0?'income':'expense',...g,src});
    });

  }else if(src==='etc'){
    // ETC: UTF-8、ヘッダーあり
    // 列: 利用年月日(yy/mm/dd),時分,...,出口IC(列5),...,通行料金(列8)
    lines.forEach(row=>{
      const c=splitCSV(row);
      if(c.length<9)return;
      const date=normalizeDate(c[0]);
      if(!date||!date.match(/^\d{4}-\d{2}-\d{2}$/))return;
      const name=`ETC ${(c[5]||'').trim()}`;
      const rawAmt=(c[8]||'0').replace(/[^\d]/g,'');
      const amount=rawAmt?-parseInt(rawAmt,10):0;
      if(amount===0)return;
      out.push({date,name,amount,type:'expense',cat:'交通',icon:'🚗',col:'#FBBF24',src:'smbc'});
    });
  }

  return out;
}

async function processFile(file){
  let src=detectSrc(file.name);
  if(!src){
    const choice=prompt(`「${file.name}」\n口座を選んでください:\n1 → 楽天カード\n2 → 三井住友(SMBC)\n3 → ゆうちょ\n4 → ETCカード`);
    if(choice==='1')src='rakuten';
    else if(choice==='2')src='smbc';
    else if(choice==='3')src='yucho';
    else if(choice==='4')src='etc';
    else{toast('キャンセルしました');return;}
  }
  let newT=[];
  try{
    if(file.name.toLowerCase().endsWith('.pdf')) newT=await parsePDF(file,src);
    else{
      const text=await decodeFile(file);
      newT=parseCSV(text,src);
      console.log('CSV parsed:',newT.length,'rows',newT.slice(0,3));
    }
    if(newT.length){
      // 既存データを全削除してから新データを挿入
      const {error:delErr}=await sb.from('transactions').delete().not('id','is',null);
      if(delErr)throw delErr;
      await saveToDB(newT);
      await loadFromDB();
      toast(`${newT.length}件に更新しました`);
    }else toast('明細が見つかりませんでした');
  }catch(e){console.error(e);toast('エラー: '+e.message);}
}
function onFile(e){Array.from(e.target.files).forEach(processFile);e.target.value='';}
function onDrop(e){e.preventDefault();document.getElementById('dropzone').classList.remove('drag');Array.from(e.dataTransfer.files).forEach(processFile);}

function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  if(!el)return;
  if(s==='loading'){el.textContent='⟳ 同期中...';el.style.color='var(--muted)';}
  else if(s==='ok'){el.textContent='✓ 同期済み';el.style.color='var(--green)';}
  else if(s==='error'){el.textContent='! オフライン';el.style.color='var(--red)';}
  else{el.textContent='';}
}

async function loadFromDB(){
  setSyncStatus('loading');
  try{
    const {data,error}=await sb.from('transactions').select('*').order('date',{ascending:false});
    if(error)throw error;
    if(data&&data.length>0){
      txns=data;
    }else{
      txns=[...DEMO_DATA];
    }
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
    txns=[...DEMO_DATA];
  }
  renderMonths();render();
}

async function saveToDB(newTxns){
  setSyncStatus('loading');
  const rows=newTxns.map(t=>({
    date:t.date,name:t.name,amount:t.amount,
    type:t.type,cat:t.cat,icon:t.icon,col:t.col,src:t.src
  }));
  const {error}=await sb.from('transactions').insert(rows);
  if(error){setSyncStatus('error');return false;}
  setSyncStatus('ok');
  return true;
}

function fmBase(){return txns.filter(t=>(selM==='all'||t.date.startsWith(selM))&&(selAcc==='all'||t.src===selAcc));}
function fmFull(){return fmBase().filter(t=>selTab==='all'||t.type===selTab);}

function setAcc(acc,el){selAcc=acc;document.querySelectorAll('.acc').forEach(c=>c.classList.remove('on'));el.classList.add('on');render();}
function setTab(tab,el){selTab=tab;document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('on'));el.classList.add('on');renderTxns();}
function setMonth(m,el){selM=m;document.querySelectorAll('.mp').forEach(p=>p.classList.remove('on'));el.classList.add('on');render();}
function setChart(m,el){
  chartMode=m;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.getElementById('cv-bar').style.display=m==='bar'?'block':'none';
  document.getElementById('cv-donut').style.display=m==='donut'?'block':'none';
  document.getElementById('chart-title').textContent=m==='bar'?'収支推移':'支出内訳';
  renderChart();
}

function render(){
  const f=fmBase();
  const inc=f.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=f.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const net=inc+exp;
  const nel=document.getElementById('net');
  nel.textContent=yen(net,true);
  nel.className='hero-amt '+(net>=0?'pos':'neg');
  document.getElementById('inc').textContent=yen(inc);
  document.getElementById('exp').textContent=yen(Math.abs(exp));
  ['rakuten','smbc','yucho'].forEach(s=>{
    const v=f.filter(t=>t.src===s).reduce((sm,t)=>sm+t.amount,0);
    const el=document.getElementById('a-'+s);
    el.textContent=yen(v,true);
    el.className='acc-amt '+(v>0?'pos':v<0?'neg':'neu');
  });
  document.getElementById('a-all').textContent=yen(inc+exp,true);
  const _ps=periodStr();
  document.getElementById('period-label').textContent=_ps;
  document.getElementById('hero-period').textContent=_ps;
  renderTxns();renderChart();
}

function renderTxns(){
  const f=fmFull().sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('txns');
  if(!f.length){el.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px">取引データがありません</div>';return;}
  let html='';let last='';
  f.slice(0,100).forEach(t=>{
    if(t.date!==last){
      const[y,mo,d]=t.date.split('-');
      html+=`<div class="dh">${y}年${parseInt(mo)}月${parseInt(d)}日</div>`;
      last=t.date;
    }
    html+=`<div class="txn">
      <div class="txn-ic">${t.icon||'📋'}</div>
      <div class="txn-bd">
        <div class="txn-nm">${esc(t.name)}</div>
        <div class="txn-meta">
          <span class="tag">${t.cat}</span>
          <span class="tag ${t.src}">${t.src==='rakuten'?'楽天':t.src==='smbc'?'SMBC':'ゆうちょ'}</span>
        </div>
      </div>
      <div class="txn-amt ${t.amount<0?'neg':'pos'}">${yen(t.amount)}</div>
    </div>`;
  });
  el.innerHTML=html;
}

function renderChart(){chartMode==='bar'?renderBars():renderDonut();}

function renderBars(){
  const used=ALL_MONTHS.filter(m=>txns.some(t=>t.date.startsWith(m)));
  if(!used.length){document.getElementById('bar-inner').innerHTML='';document.getElementById('bar-xlabels').innerHTML='';document.getElementById('chart-sub').textContent='';return;}
  const show=used.slice(-7);
  const data=show.map(m=>({
    m,
    inc:txns.filter(t=>t.date.startsWith(m)&&t.type==='income'&&(selAcc==='all'||t.src===selAcc)).reduce((s,t)=>s+t.amount,0),
    exp:Math.abs(txns.filter(t=>t.date.startsWith(m)&&t.type==='expense'&&(selAcc==='all'||t.src===selAcc)).reduce((s,t)=>s+t.amount,0))
  }));
  const mx=Math.max(...data.map(d=>Math.max(d.inc,d.exp)),1);
  const H=108;
  const ysteps=[mx,mx*.75,mx*.5,mx*.25,0];
  document.getElementById('bar-yaxis').innerHTML=ysteps.map(v=>`<div class="bar-ylabel">${v>0?yen(v):''}</div>`).join('');
  document.getElementById('bar-inner').innerHTML=data.map(d=>`
    <div class="bg">
      <div class="bw">
        <div class="b inc" style="height:${Math.max(2,Math.round(d.inc/mx*H))}px" title="収入 ${yen(d.inc)}"></div>
        <div class="b exp" style="height:${Math.max(2,Math.round(d.exp/mx*H))}px" title="支出 ${yen(d.exp)}"></div>
      </div>
    </div>`).join('');
  document.getElementById('bar-xlabels').innerHTML=data.map(d=>`<div class="bar-xl">${mlbl(d.m)}</div>`).join('');
  document.getElementById('chart-sub').textContent=periodStr();
}

function renderDonut(){
  const f=fmBase().filter(t=>t.type==='expense');
  const map={};
  f.forEach(t=>{map[t.cat]=(map[t.cat]||0)+Math.abs(t.amount);});
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,9);
  const total=sorted.reduce((s,[,v])=>s+v,0)||1;
  document.getElementById('chart-sub').textContent=periodStr();
  const cx=72,cy=72,R=62,ri=42;
  let ang=-Math.PI/2;
  const gap=0.03;
  let paths='';
  sorted.forEach(([cat,val])=>{
    const frac=val/total;
    const sweep=frac*Math.PI*2-gap;
    if(sweep<=0)return;
    const ea=ang+sweep;
    const x1=cx+R*Math.cos(ang+gap/2),y1=cy+R*Math.sin(ang+gap/2);
    const x2=cx+R*Math.cos(ea),y2=cy+R*Math.sin(ea);
    const ix1=cx+ri*Math.cos(ea),iy1=cy+ri*Math.sin(ea);
    const ix2=cx+ri*Math.cos(ang+gap/2),iy2=cy+ri*Math.sin(ang+gap/2);
    const lg=sweep>Math.PI?1:0;
    paths+=`<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${lg},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix1.toFixed(2)},${iy1.toFixed(2)} A${ri},${ri} 0 ${lg},0 ${ix2.toFixed(2)},${iy2.toFixed(2)} Z" fill="${cCol(cat)}" opacity=".88"/>`;
    ang+=frac*Math.PI*2;
  });
  document.getElementById('dsvg').innerHTML=paths;
  document.getElementById('dc-val').textContent=yen(total);
  document.getElementById('dlegend').innerHTML=sorted.slice(0,6).map(([cat,val])=>`
    <div class="dl-row">
      <div class="dl-dot" style="background:${cCol(cat)}"></div>
      <div class="dl-name">${cIco(cat)} ${cat}</div>
      <div class="dl-right">
        <div class="dl-pct">${Math.round(val/total*100)}%</div>
        <span class="dl-amt">${yen(val)}</span>
      </div>
    </div>`).join('');
}

function renderMonths(){
  const used=new Set(txns.map(t=>t.date.slice(0,7)));
  const row=document.getElementById('mrow');
  row.innerHTML='';
  const ab=document.createElement('button');
  ab.className='mp'+(selM==='all'?' on':'');
  ab.textContent='全期間';ab.onclick=function(){setMonth('all',this);};
  row.appendChild(ab);
  ALL_MONTHS.filter(m=>used.has(m)).sort().reverse().forEach(m=>{
    const b=document.createElement('button');
    b.className='mp'+(selM===m?' on':'');
    b.textContent=mlbl(m);b.onclick=function(){setMonth(m,this);};
    row.appendChild(b);
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

loadFromDB();
</script>
